# Schedule — "No badges. No pitches. Just coffee."
schedule:
  eyebrow: How it works
  heading: No badges. No pitches. Just coffee.
  intro: Here's how a typical Tuesday runs.
  rows:
    - time: "7:30"
      title: Open Networking
      body: Grab a coffee, settle in, and say hi to a stranger.
    - time: "8:15"
      title: Gives and Asks
      body: The "giving first" mentality that keeps the community moving forward.
    - time: "8:30"
      title: Open Networking
      body: Find your people and keep chatting.
    - time: "9:00"
      title: Wrap Up
      body: Head to work or stick around to co-work — the lobby has tables and Wi-Fi.


# _data/home.yml — content for the home page sections.
# Edit copy here; the home layout + includes render it. No markup edits needed.

hero:
  badge: "Tuesdays · 7:30–9:00 AM · Seneca One"
  title: Your First Free Entrepreneurial Step in Buffalo
  lead: A free, no-frills coffee meetup for the people building businesses in the 716.
  cta_label: Join Us on Tuesday
  cta_url: https://www.eventbrite.com/e/buffalo-open-coffee-club-tickets-1983098086761


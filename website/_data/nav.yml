# _data/nav.yml — single source of truth for site chrome (header + footer).
# Editors change links here; no template edits needed.

brand:
  name: Buffalo Open Coffee Club
  wordmark: Buffalo Open Coffee Club          # shown beside the logo in the header/footer
  tagline: The first stop for Buffalo's startup community. Built by neighbors, for neighbors.
  funding: Buffalo Open Coffee Club is made possible through the Springboard Prize Competition, supported by the Ralph C. Wilson, Jr. Foundation.


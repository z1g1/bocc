# Site settings — Buffalo Open Coffee Club (716coffee.club)
# NOTE: Jekyll does NOT reload this file on `serve`. Restart after edits.

locale: "en-US"
lang: "en-US"
title: Buffalo Open Coffee Club
email: bocc@zackglick.com
description: >- # ignore newlines until the next key
  Buffalo Open Coffee Club (BOCC) is a free weekly networking event every Tuesday 7:30-9 AM
  at Seneca One Tower in downtown Buffalo, NY. Connect with entrepreneurs, small business
  owners, and startup founders over coffee. Open to all — register free on Eventbrite.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://716coffee.club" # base hostname & protocol, no trailing slash
domain: "716coffee.club"

# ---- SEO (jekyll-seo-tag) ----
author: Buffalo Open Coffee Club
og_image: /assets/images/BOCC-header-image-coffee-background.png
twitter:
  username: buffaloopencoffeeclub
  card: summary_large_image
social:
  name: Buffalo Open Coffee Club
  links:
    - https://www.linkedin.com/showcase/buffalo-open-coffee
    - https://www.instagram.com/buffaloopencoffeeclub
    - https://www.facebook.com/buffaloopencoffeeclub

# Default social-share image for every page (override per-page with `image:`).
# TODO: replace with the client's 1200×630 og-default.png when delivered (README §Assets).
defaults:
  - scope: { path: "" }
    values:
      image: /assets/images/BOCC-header-image-coffee-background.png

# ---- Event data (consumed by _includes/event-jsonld.html + home/signup) ----
event:
  description: Free weekly networking for Buffalo's entrepreneurs, small business owners, and startup founders. Open networking followed by community Gives and Asks.
  venue: Seneca One Tower
  organizer: BootSector
  organizer_url: https://joinbootsector.com/
  registration_url: https://www.eventbrite.com/e/buffalo-open-coffee-club-tickets-1983098086761
  eventbrite_id: "1983098086761"
  performer:
    name: Zack Glick
    url: https://www.linkedin.com/in/zglick/
  address:
    streetAddress: 1 Seneca St
    addressLocality: Buffalo
    addressRegion: NY
    postalCode: "14203"
    addressCountry: US

# ---- Build settings ----
markdown: kramdown

plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap

sass:
  style: compressed   # minified /assets/css/main.css in production

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - output/
  - README.md

# No gem theme: all layouts/includes/sass are local (overrides github-pages default primer theme).
theme: null
